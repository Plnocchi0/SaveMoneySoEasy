<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F0E8">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>CardFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F0E8;--bg2:#FDFAF4;--bg3:#EDE8DD;--bg4:#E5DFD2;
  --gold:#8B6914;--gold2:#6B5010;--gold-lt:#C9A84C;
  --gold-dim:rgba(139,105,20,.07);--gold-bd:rgba(139,105,20,.22);
  --ink:#2A2520;--ink2:rgba(42,37,32,.55);--ink3:rgba(42,37,32,.32);
  --bd:rgba(42,37,32,.1);--bd2:rgba(42,37,32,.18);
  --grn:#3D7A6E;--grn-dim:rgba(61,122,110,.07);--grn-bd:rgba(61,122,110,.22);
  --red:#8B3030;--red-dim:rgba(139,48,48,.07);--red-bd:rgba(139,48,48,.22);
  --pur:#7A4E7A;--blu:#3D5F8B;
  --safe-b:env(safe-area-inset-bottom,0px);--r:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans Thai',sans-serif;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:'IBM Plex Sans Thai',sans-serif;font-size:15px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-bd)!important;box-shadow:0 0 0 3px rgba(139,105,20,.06)}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{display:none}
#content{padding:14px 14px calc(14px + var(--safe-b));max-width:500px;margin:0 auto}
/* Header */
#hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;flex-shrink:0}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold2);font-style:italic}
.save-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink3);letter-spacing:.04em}
.sdot{width:6px;height:6px;border-radius:50%;transition:background .3s}
.sdot.saved{background:var(--grn)}.sdot.saving{background:var(--gold-lt)}.sdot.error{background:var(--red)}
/* Bottom nav */
#nav{background:var(--bg2);border-top:1px solid var(--bd);display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0;padding-bottom:var(--safe-b)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;cursor:pointer;border:none;background:none;color:var(--ink3);font-size:9.5px;letter-spacing:.03em;transition:color .15s}
.ni.active{color:var(--gold2)}
.ni-ic{font-size:17px;line-height:1}
/* Cards & layout */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sec-t{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold2);font-style:italic;margin-bottom:10px}
/* Metric */
.mg{display:grid;gap:7px;margin-bottom:10px}
.mg2{grid-template-columns:repeat(2,1fr)}.mg3{grid-template-columns:repeat(3,1fr)}
.met{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:11px 11px 9px}
.met.hi{background:rgba(139,105,20,.05);border-color:var(--gold-bd)}
.met.inc{background:var(--grn-dim);border-color:var(--grn-bd)}
.met.exp{background:var(--red-dim);border-color:var(--red-bd)}
.met.net-p{background:rgba(61,122,110,.06);border-color:rgba(61,122,110,.2)}
.met.net-n{background:rgba(139,48,48,.06);border-color:rgba(139,48,48,.2)}
.ml{font-size:9.5px;color:var(--ink3);letter-spacing:.07em;text-transform:uppercase;font-weight:500;display:block;margin-bottom:4px}
.mv{font-family:'Playfair Display',serif;font-size:19px;font-weight:400;display:block;line-height:1.1;letter-spacing:-.2px}
.ms{font-size:10px;color:var(--ink3);display:block;margin-top:2px}
/* Pills */
.pill{display:inline-flex;align-items:center;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;letter-spacing:.03em}
.p-norm{background:rgba(139,105,20,.1);color:#6B5010;border:1px solid rgba(139,105,20,.25)}
.p-inst{background:rgba(61,122,110,.1);color:#2D5A52;border:1px solid rgba(61,122,110,.25)}
.p-sply{background:rgba(122,78,122,.1);color:#5A3A5A;border:1px solid rgba(122,78,122,.25)}
.p-inc{background:rgba(61,122,110,.1);color:var(--grn);border:1px solid rgba(61,122,110,.25)}
.p-exp{background:rgba(139,48,48,.08);color:var(--red);border:1px solid rgba(139,48,48,.2)}
.p-cc{background:rgba(61,95,139,.1);color:var(--blu);border:1px solid rgba(61,95,139,.25)}
.p-cat{background:var(--bg3);color:var(--ink2);border:1px solid var(--bd)}
/* Forms */
.inp{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--ink);line-height:1.4}
.sel{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--ink);-webkit-appearance:none}
.ta{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--ink);resize:none;line-height:1.5}
.fr{margin-bottom:11px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lbl{font-size:10px;color:var(--ink3);display:block;margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase;font-weight:500}
.hint{font-size:11px;color:var(--gold2);padding:6px 10px;background:var(--gold-dim);border-radius:6px;border:1px solid var(--gold-bd);margin-top:5px;display:block}
/* Buttons */
.btn{width:100%;border:none;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.02em}
.btn-gold{background:var(--gold2);color:#FDFAF4}
.btn-grn{background:var(--grn);color:#fff}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--bd2);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;width:auto}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-bd);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;width:auto}
.btn-sm{padding:6px 10px;font-size:11px}
/* Type tabs */
.ttabs{display:flex;gap:5px}
.tt{flex:1;padding:9px 0;font-size:12.5px;border-radius:8px;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--ink2);font-family:'IBM Plex Sans Thai',sans-serif;transition:all .12s}
.tt.a-norm{background:rgba(139,105,20,.1);color:#6B5010;border-color:rgba(139,105,20,.4)}
.tt.a-inst{background:rgba(61,122,110,.1);color:#2D5A52;border-color:rgba(61,122,110,.4)}
.tt.a-sply{background:rgba(122,78,122,.1);color:#5A3A5A;border-color:rgba(122,78,122,.4)}
.tt.a-inc{background:rgba(61,122,110,.1);color:var(--grn);border-color:rgba(61,122,110,.4)}
.tt.a-exp{background:rgba(139,48,48,.08);color:var(--red);border-color:rgba(139,48,48,.3)}
.tt.a-cc{background:rgba(61,95,139,.1);color:var(--blu);border-color:rgba(61,95,139,.4)}
/* Radio */
.rb{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:11px}
.rr{display:flex;gap:16px;margin-top:3px}
.rl{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink2);cursor:pointer}
.rl input{accent-color:var(--gold2)}
/* Row items */
.ri{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 6px;border-bottom:1px solid var(--bd);border-radius:6px;transition:background .1s}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--bg3)}
/* Overlay / Sheet */
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(42,37,32,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sh{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid var(--bd);padding:18px 14px calc(22px + var(--safe-b));width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sh::-webkit-scrollbar{display:none}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sh-t{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);font-style:italic}
/* Color dots */
.cdots{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.cd{width:20px;height:20px;border-radius:50%;cursor:pointer;outline:2.5px solid transparent;outline-offset:2px;transition:outline .12s;flex-shrink:0}
.cd.sel{outline-color:var(--gold2)}
/* Alert */
.alert{border-radius:10px;padding:10px 13px;margin-bottom:9px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.alert-warn{background:rgba(139,105,20,.06);border:1px solid var(--gold-bd);color:var(--gold2)}
.alert-err{background:rgba(139,48,48,.06);border:1px solid var(--red-bd);color:var(--red)}
/* Bar chart */
.bw{display:flex;gap:5px;align-items:flex-end}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.bs{width:100%;display:flex;flex-direction:column;justify-content:flex-end;background:var(--bg3);border-radius:4px 4px 0 0;overflow:hidden;transition:outline .15s}
.bs.sel-mo{outline:2px solid var(--gold-bd);outline-offset:1px}
.b-lbl{font-size:8.5px;text-align:center;margin-top:1px}
.b-amt{font-size:8px;text-align:center;min-height:11px}
/* Progress */
.prg{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;margin-top:5px}
.prg-f{height:100%;border-radius:4px;transition:width .4s}
/* Dialog */
.dlg-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(42,37,32,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.dlg{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd);padding:22px 18px;max-width:310px;width:100%;text-align:center}
.dlg-t{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);font-style:italic;margin-bottom:8px}
.dlg-b{font-size:12.5px;color:var(--ink2);line-height:1.6;margin-bottom:18px}
.dlg-btns{display:flex;gap:8px}
/* Month nav */
.msel{display:flex;align-items:center;margin-bottom:12px}
.mbtn{background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--ink2)}
.mlbl{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold2);font-style:italic;flex:1;text-align:center}
/* Section tabs within page */
.stabs{display:flex;gap:0;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px}
.stab{flex:1;padding:8px 4px;font-size:11.5px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--ink3);transition:all .13s;border-right:1px solid var(--bd)}
.stab:last-child{border-right:none}
.stab.active{background:var(--gold-dim);color:var(--gold2);font-weight:500}
/* Settings section */
.set-sec{margin-bottom:16px}
.set-sec-t{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:8px}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
/* Fade */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .28s cubic-bezier(.22,1,.36,1) both}
@keyframes shUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.sh-in{animation:shUp .22s cubic-bezier(.22,1,.36,1) both}
/* Empty */
.empty{text-align:center;padding:28px 0;color:var(--ink3);font-size:13px}
/* Checkbox toggle */
.tog{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink2);cursor:pointer;margin-bottom:10px}
.tog input{accent-color:var(--gold2);width:15px;height:15px}
/* Scrollable month strip */
.mo-strip{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:0;scrollbar-width:none}
.mo-strip::-webkit-scrollbar{display:none}
.mo-chip{flex-shrink:0;padding:5px 12px;font-size:11px;cursor:pointer;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--ink3);margin-right:5px;white-space:nowrap;transition:all .13s}
.mo-chip.sel{background:var(--gold-dim);border-color:var(--gold-lt);color:var(--gold2);font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">CardFlow</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="save-pill"><div class="sdot saved" id="sdot"></div><span id="stxt">аёҡаёұаёҷаё—аё¶аёҒа№ҒаёҘа№үаё§</span></div>
    </div>
  </div>
  <div id="main"><div id="content"></div></div>
  <div id="nav">
    <button class="ni active" onclick="switchTab('overview')" id="tab-overview"><span class="ni-ic">в—Ҳ</span><span>аё аёІаёһаёЈаё§аёЎ</span></button>
    <button class="ni" onclick="switchTab('ledger')" id="tab-ledger"><span class="ni-ic">вҠһ</span><span>аёҡаёұаёҷаё—аё¶аёҒ</span></button>
    <button class="ni" onclick="switchTab('analyze')" id="tab-analyze"><span class="ni-ic">в—ү</span><span>аёӯаёӯаёЎа№ҖаёҮаёҙаёҷ</span></button>
    <button class="ni" onclick="switchTab('settings')" id="tab-settings"><span class="ni-ic">вҠҷ</span><span>аё•аёұа№үаёҮаё„а№ҲаёІ</span></button>
  </div>
</div>
<div id="sc"></div>
<div id="dc"></div>
 
<script>
/* в•җв•җ CONSTANTS в•җв•җ */
const CARD_COLORS=['#8B6914','#3D7A6E','#7A4E7A','#3D5F8B','#8B4A3A','#4A7A3A'];
const CAT_COLORS=['#8B6914','#3D7A6E','#7A4E7A','#3D5F8B','#8B4A3A','#4A7A3A','#6B6B6B','#855070','#507085'];
const MO=['аёЎ.аё„.','аёҒ.аёһ.','аёЎаёө.аё„.','а№ҖаёЎ.аёў.','аёһ.аё„.','аёЎаёҙ.аёў.','аёҒ.аё„.','аёӘ.аё„.','аёҒ.аёў.','аё•.аё„.','аёһ.аёў.','аёҳ.аё„.'];
const INC_CATS=['а№ҖаёҮаёҙаёҷа№Җаё”аё·аёӯаёҷ','Freelance','аё”аёӯаёҒа№Җаёҡаёөа№үаёў/аёӣаёұаёҷаёңаёҘ','аёӮаёІаёўаёӮаёӯаёҮ','аёЈаёІаёўа№„аё”а№үаёӯаё·а№Ҳаёҷ'];
const EXP_CATS_DEF=['аёӯаёІаё«аёІаёЈ','аёҠа№үаёӯаёӣаёӣаёҙа№үаёҮ','аё—а№ҲаёӯаёҮа№Җаё—аёөа№Ҳаёўаё§','аё„а№ҲаёІа№ҖаёҠа№ҲаёІ/аёҡа№үаёІаёҷ','аёӘаёёаёӮаё аёІаёһ','аёҡаёұаёҷа№Җаё—аёҙаёҮ','аё„а№ҲаёІа№Җаё”аёҙаёҷаё—аёІаёҮ','аё„а№ҲаёІаёӘаёІаёҳаёІаёЈаё“аё№аёӣа№Ӯаё аё„','аёҒаёІаёЈаёЁаё¶аёҒаё©аёІ','аёӯаё·а№Ҳаёҷа№Ҷ'];
const PAY=['а№ҖаёҮаёҙаёҷаёӘаё”','а№Ӯаёӯаёҷа№ҖаёҮаёҙаёҷ','QR Pay','Prompt Pay'];
const CC_TYPES={normal:'аёӣаёҒаё•аёҙ',installment:'аёңа№Ҳаёӯаёҷ',spaylater:'Spaylater'};
const genId=()=>Math.random().toString(36).slice(2,9);
const fmt=n=>Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
const mk=(m,y)=>`${y}-${String(m+1).padStart(2,'0')}`;
const T=new Date();const TM=T.getMonth();const TY=T.getFullYear();const TD=T.toISOString().slice(0,10);
 
/* в•җв•җ STATE в•җв•җ */
let S={
  cards:[
    {id:'c1',name:'KTC Platinum',cutDay:15,dueDay:10,color:CARD_COLORS[0]},
    {id:'c2',name:'SCB M Visa',cutDay:28,dueDay:25,color:CARD_COLORS[1]}
  ],
  ccTxs:[
    {id:'t1',cardId:'c1',desc:'Villa Market',date:`${TY}-${String(TM+1).padStart(2,'0')}-05`,type:'normal',amount:3200,cat:'аёӯаёІаё«аёІаёЈ'},
    {id:'t2',cardId:'c1',desc:'iPhone case',date:`${TY}-${String(TM||1).padStart(2,'0')}-20`,type:'installment',knownType:'monthly',totalInst:10,startInst:4,monthly:890,amount:8900,cat:'аёҠа№үаёӯаёӣаёӣаёҙа№үаёҮ'},
    {id:'t3',cardId:'c2',desc:'Shopee',date:`${TY}-${String(TM+1).padStart(2,'0')}-12`,type:'spaylater',totalInst:3,startInst:1,monthly:1200,amount:3600,cat:'аёҠа№үаёӯаёӣаёӣаёҙа№үаёҮ'},
    {id:'t4',cardId:'c2',desc:'аё„а№ҲаёІа№„аёҹ+аёҷа№үаёі',date:`${TY}-${String(TM+1).padStart(2,'0')}-18`,type:'normal',amount:1850,cat:'аё„а№ҲаёІаёӘаёІаёҳаёІаёЈаё“аё№аёӣа№Ӯаё аё„'}
  ],
  incomes:[
    {id:'i1',desc:'а№ҖаёҮаёҙаёҷа№Җаё”аё·аёӯаёҷ',date:`${TY}-${String(TM+1).padStart(2,'0')}-25`,amount:45000,cat:'а№ҖаёҮаёҙаёҷа№Җаё”аё·аёӯаёҷ',recurring:true,note:''}
  ],
  expenses:[
    {id:'e1',desc:'аё„а№ҲаёІа№ҖаёҠа№ҲаёІ',date:`${TY}-${String(TM+1).padStart(2,'0')}-01`,amount:12000,cat:'аё„а№ҲаёІа№ҖаёҠа№ҲаёІ/аёҡа№үаёІаёҷ',pay:'а№Ӯаёӯаёҷа№ҖаёҮаёҙаёҷ',recurring:true,note:''},
    {id:'e2',desc:'Grab Food',date:`${TY}-${String(TM+1).padStart(2,'0')}-10`,amount:350,cat:'аёӯаёІаё«аёІаёЈ',pay:'QR Pay',recurring:false,note:''}
  ],
  goals:[
    {id:'g1',name:'аёҒаёӯаёҮаёүаёёаёҒа№Җаёүаёҙаёҷ',monthlyTarget:5000,totalTarget:60000,startDate:`${TY}-01-01`,color:CARD_COLORS[1],note:'6 а№Җаё”аё·аёӯаёҷаё„а№ҲаёІа№ғаёҠа№үаёҲа№ҲаёІаёў'}
  ],
  expCats:[...EXP_CATS_DEF],
  threshold:25000
};
 
/* в•җв•җ STORAGE в•җв•җ */
const SK='cf3';
let svTimer=null;
function load(){try{const r=localStorage.getItem(SK);if(r)Object.assign(S,JSON.parse(r));}catch(e){}}
function save(){
  setSS('saving');clearTimeout(svTimer);
  svTimer=setTimeout(()=>{
    try{localStorage.setItem(SK,JSON.stringify(S));setSS('saved');}
    catch(e){setSS('error');}
  },500);
}
function setSS(s){
  const d=document.getElementById('sdot'),t=document.getElementById('stxt');
  if(!d)return;d.className='sdot '+s;

/* в•җв•җ CC CALC в•җв•җ */
function cyc(date,cut){
  const d=new Date(date);
  if(d.getDate()<=cut)return{m:d.getMonth(),y:d.getFullYear()};
  const n=new Date(d.getFullYear(),d.getMonth()+1,1);return{m:n.getMonth(),y:n.getFullYear()};
}
function addM(m,y,n){const d=new Date(y,m+n,1);return{m:d.getMonth(),y:d.getFullYear()};}
function sched(tx,card){
  if(tx.type==='normal'){const s=cyc(tx.date,card.cutDay);return[{m:s.m,y:s.y,a:tx.amount}];}
  const base=cyc(tx.date,card.cutDay),rem=tx.totalInst-tx.startInst+1;
  return Array.from({length:rem},(_,i)=>{const{m,y}=addM(base.m,base.y,i);return{m,y,a:tx.monthly};});
}
function ccDue(m,y){
  let t=0;
  S.ccTxs.forEach(tx=>{
    const card=S.cards.find(c=>c.id===tx.cardId);if(!card)return;
    sched(tx,card).forEach(s=>{if(s.m===m&&s.y===y)t+=s.a;});
  });
  return t;
}
function ccDueCard(cardId,m,y){
  let t=0;
  S.ccTxs.filter(tx=>tx.cardId===cardId).forEach(tx=>{
    const card=S.cards.find(c=>c.id===tx.cardId);if(!card)return;
    sched(tx,card).forEach(s=>{if(s.m===m&&s.y===y)t+=s.a;});
  });
  return t;
}
 
/* в•җв•җ CASH CALC в•җв•җ */
function incMo(m,y){return S.incomes.filter(i=>{const d=new Date(i.date);return d.getMonth()===m&&d.getFullYear()===y;}).reduce((s,i)=>s+i.amount,0);}
function expMo(m,y){return S.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).reduce((s,e)=>s+e.amount,0);}
function netMo(m,y){return incMo(m,y)-expMo(m,y)-ccDue(m,y);}
 
/* в•җв•җ MONTHS RANGE: 6 past + current + 6 future = 13 в•җв•җ */
function get13Mo(){
  return Array.from({length:13},(_,i)=>{
    const d=new Date(TY,TM-6+i,1);return{m:d.getMonth(),y:d.getFullYear()};
  });
}
function get6Mo(){
  return Array.from({length:6},(_,i)=>{
    const d=new Date(TY,TM+i,1);return{m:d.getMonth(),y:d.getFullYear()};
  });
}

function goalAccum(g){
  let tot=0;const st=new Date(g.startDate);
  for(let i=0;i<36;i++){
    const d=new Date(st.getFullYear(),st.getMonth()+i,1);
    if(d>T)break;
    tot+=Math.max(0,netMo(d.getMonth(),d.getFullYear()));
  }
  return tot;
}

function setCCType(t,btn){
  document.getElementById('ctype').value=t;
  document.querySelectorAll('.tt').forEach(b=>{b.className='tt';});
  btn.classList.add(t==='normal'?'a-norm':t==='installment'?'a-inst':'a-sply');
  document.getElementById('cc-norm').style.display=t==='normal'?'':'none';
  document.getElementById('cc-inst').style.display=t!=='normal'?'':'none';
}
function setKnown(v){
  document.getElementById('kn-mo').style.display=v==='total'?'none':'';
  document.getElementById('kn-tot').style.display=v==='total'?'':'none';
  const h=document.getElementById('perinsthint');if(h)h.style.display=v==='total'?'':'none';
}
function updRem(){
  const tot=parseInt(document.getElementById('ctinst')?.value)||12;
  const st=parseInt(document.getElementById('csinst')?.value)||1;
  const h=document.getElementById('remhint');if(h)h.textContent=`а№Җаё«аёҘаё·аёӯаёӯаёөаёҒ ${Math.max(0,tot-st+1)} аёҮаё§аё”`;
}
function updPerInst(){
  const amt=parseFloat(document.getElementById('ctotamt')?.value)||0;
  const tot=parseInt(document.getElementById('ctinst')?.value)||1;
  const h=document.getElementById('perinsthint');
  if(h&&amt&&tot){h.style.display='';h.textContent=`вүҲ аёҝ${fmt(Math.round(amt/tot))} / аёҮаё§аё”`;}
}
function saveCCTx(eid){
  const cardId=document.getElementById('ccard').value;
  const desc=document.getElementById('cdesc').value.trim();
  const date=document.getElementById('cdate').value;
  const type=document.getElementById('ctype').value;
  const cat=document.getElementById('ccat').value;
  if(!desc||!date||!cardId)return alert('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒаёӮа№үаёӯаёЎаё№аёҘа№ғаё«а№үаё„аёЈаёҡ');
  let obj={id:eid||genId(),cardId,desc,date,type,cat,amount:0};
  if(type==='normal'){
    const amt=parseFloat(document.getElementById('camt')?.value)||0;
    if(!amt)return alert('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаёўаёӯаё”');
    obj.amount=amt;
  } else {
    const kn=document.querySelector('input[name="kn"]:checked')?.value||'monthly';
    const tot=parseInt(document.getElementById('ctinst').value)||12;
    const st=parseInt(document.getElementById('csinst').value)||1;
    obj.knownType=kn;obj.totalInst=tot;obj.startInst=st;
    if(kn==='monthly'){const m=parseFloat(document.getElementById('cmonthly')?.value)||0;if(!m)return alert('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаёўаёӯаё”аё•а№ҲаёӯаёҮаё§аё”');obj.monthly=m;obj.amount=m*tot;}
    else{const ta=parseFloat(document.getElementById('ctotamt')?.value)||0;if(!ta)return alert('аёҒаёЈаёёаё“аёІаёЈаё°аёҡаёёаёўаёӯаё”аёЈаё§аёЎ');obj.monthly=Math.round(ta/tot);obj.amount=ta;}
  }
  if(eid)S.ccTxs=S.ccTxs.map(t=>t.id===eid?obj:t);else S.ccTxs.push(obj);
  save();cls();render();
}
function delCCTx(id){confirm2('аёҘаёҡаёЈаёІаёўаёҒаёІаёЈаёҷаёөа№ү?','',()=>{S.ccTxs=S.ccTxs.filter(t=>t.id!==id);save();render();});}

/* в”Җ Card Detail в”Җ */

  const committed=txs.filter(t=>t.type!=='normal').reduce((s,t)=>s+t.monthly*(t.totalInst-t.startInst+1),0);
 
  openSheet(`<div class="sh-hdr">

    }).join('')}

      </div>
      <div style="font-size:10px;color:var(--ink3)">${tx.date}${tx.type!=='normal'?' В· аёҮаё§аё” '+tx.startInst+'вҖ“'+tx.totalInst+' Г—аёҝ'+fmt(tx.monthly):''}</div>

}
 
/* в”Җ Saving Goal в”Җ */
function openAddGoal(id){
  const ex=id?S.goals.find(g=>g.id===id):null;
  const v=ex||{name:'',monthlyTarget:'',totalTarget:'',startDate:TD,color:CARD_COLORS[1],note:''};
  openSheet(`<div class="sh-hdr"><span class="sh-t">${ex?'а№ҒаёҒа№үа№„аёӮа№Җаёӣа№үаёІаё«аёЎаёІаёў':'а№Җаёӣа№үаёІаё«аёЎаёІаёўаёӯаёӯаёЎа№ғаё«аёЎа№Ҳ'}</span><button class="btn-ghost" onclick="cls()">аёӣаёҙаё”</button></div>
    <div class="fr"><label class="lbl">аёҠаё·а№Ҳаёӯа№Җаёӣа№үаёІаё«аёЎаёІаёў</label><input class="inp" id="gn" value="${v.name}" placeholder="а№ҖаёҠа№Ҳаёҷ аёҒаёӯаёҮаёүаёёаёҒа№Җаёүаёҙаёҷ"></div>
    <div class="fg2">
      <div class="fr"><label class="lbl">а№Җаёӣа№үаёІ/а№Җаё”аё·аёӯаёҷ (аёҡаёІаё—)</label><input class="inp" type="number" id="gm" value="${v.monthlyTarget||''}" placeholder="5,000"></div>
      <div class="fr"><label class="lbl">а№Җаёӣа№үаёІаёЈаё§аёЎ (аёҡаёІаё—)</label><input class="inp" type="number" id="gt" value="${v.totalTarget||''}" placeholder="а№„аёЎа№ҲаёҡаёұаёҮаё„аёұаёҡ"></div>
    </div>
    <div class="fg2">
      <div class="fr"><label class="lbl">аё§аёұаёҷа№ҖаёЈаёҙа№ҲаёЎ</label><input class="inp" type="date" id="gs" value="${v.startDate}"></div>
      <div class="fr"><label class="lbl">аёӘаёө</label>
        <div class="cdots">${CARD_COLORS.map(c=>`<div class="cd${c===v.color?' sel':''}" style="background:${c}" onclick="selCol(this,'${c}')"></div>`).join('')}</div>
        <input type="hidden" id="gcol" value="${v.color}">
      </div>
    </div>
    <div class="fr"><label class="lbl">аё«аёЎаёІаёўа№Җаё«аё•аёё</label><input class="inp" id="gnote" value="${v.note||''}" placeholder="а№„аёЎа№ҲаёҡаёұаёҮаё„аёұаёҡ"></div>
    <button class="btn btn-gold" onclick="saveGoal('${ex?.id||''}')">аёҡаёұаёҷаё—аё¶аёҒ</button>`);
}
function saveGoal(eid){
  const name=document.getElementById('gn').value.trim(),m=parseFloat(document.getElementById('gm').value)||0,s=document.getElementById('gs').value;
  if(!name||!m||!s)return alert('аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒаёҠаё·а№Ҳаёӯ, а№Җаёӣа№үаёІ/а№Җаё”аё·аёӯаёҷ, а№ҒаёҘаё°аё§аёұаёҷа№ҖаёЈаёҙа№ҲаёЎ');
  const obj={id:eid||genId(),name,monthlyTarget:m,totalTarget:parseFloat(document.getElementById('gt').value)||0,startDate:s,color:document.getElementById('gcol').value,note:document.getElementById('gnote').value.trim()};
  if(eid)S.goals=S.goals.map(g=>g.id===eid?obj:g);else S.goals.push(obj);
  save();cls();render();
}
function delGoal(id){confirm2('аёҘаёҡа№Җаёӣа№үаёІаё«аёЎаёІаёўаёҷаёөа№ү?','',()=>{S.goals=S.goals.filter(g=>g.id!==id);save();render();});}
 
/* в•җв•җ UTILITIES в•җв•җ */
function chMo(d){
  let{m,y}=selMo;m+=d;if(m<0){m=11;y--;}if(m>11){m=0;y++;}
  selMo={m,y};render();
}
let _confirmCb=null;
function confirm2(title,body,fn){
  _confirmCb=fn;
  const dc=document.getElementById('dc');
  dc.innerHTML=`<div class="dlg-ov" id="dlg-ov">
    <div class="dlg">
      <div class="dlg-t">${title}</div>
      ${body?`<div class="dlg-b">${body}</div>`:'<div style="height:8px"></div>'}
      <div class="dlg-btns">
        <button id="dlg-cancel" class="btn-ghost" style="flex:1;padding:10px 0;border-radius:8px">аёўаёҒа№ҖаёҘаёҙаёҒ</button>
        <button id="dlg-confirm" style="flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 0;font-size:13px;font-weight:500;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif">аёўаё·аёҷаёўаёұаёҷ</button>
      </div>
    </div>
  </div>`;
  document.getElementById('dlg-cancel').addEventListener('click',()=>{dc.innerHTML='';_confirmCb=null;});
  document.getElementById('dlg-confirm').addEventListener('click',()=>{
    const cb=_confirmCb;dc.innerHTML='';_confirmCb=null;if(cb)cb();
  });
}
function exportData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`cardflow-${TD}.json`;a.click();
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{Object.assign(S,JSON.parse(e.target.result));save();cls();render();}catch{alert('а№„аёҹаёҘа№Ңа№„аёЎа№Ҳаё–аё№аёҒаё•а№үаёӯаёҮ');}};r.readAsText(f);
}
function confirmReset(){confirm2('аёЈаёөа№ҖаёӢа№Үаё•аё—аёұа№үаёҮаё«аёЎаё”?','аёӮа№үаёӯаёЎаё№аёҘаёҲаё°аё«аёІаёўаё–аёІаё§аёЈ аё„аё§аёЈ Export аёҒа№Ҳаёӯаёҷ',()=>{localStorage.removeItem(SK);location.reload();});}
 
/* в•җв•җ INIT в•җв•җ */
load();render();
</script>
